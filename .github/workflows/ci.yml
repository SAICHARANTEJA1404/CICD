name: Java CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build Application
        run: mvn clean verify

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-war
          path: target/cicd.war

  deploy:
    needs: build
    runs-on: self-hosted

    steps:
      - name: Download WAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: springboot-war

      - name: Verify Download
        shell: powershell
        run: |
          Get-ChildItem

      - name: Deploy to Tomcat
        shell: powershell
        run: |
          $tomcatHome = "D:\Softwares\apache-tomcat-11.0.22"
          $webapps = "$tomcatHome\webapps"

          $sourceWar = ".\cicd.war"
          $targetWar = "$webapps\cicd.war"
          $explodedFolder = "$webapps\cicd"

          if (!(Test-Path $sourceWar)) {
              Write-Error "WAR file not found: $sourceWar"
              exit 1
          }

          Write-Host "Stopping Tomcat..."
          & "$tomcatHome\bin\shutdown.bat"

          Start-Sleep -Seconds 10

          Write-Host "Removing previous deployment..."

          if (Test-Path $targetWar) {
              Remove-Item $targetWar -Force
          }

          if (Test-Path $explodedFolder) {
              Remove-Item $explodedFolder -Recurse -Force
          }

          Write-Host "Copying WAR..."
          Copy-Item $sourceWar $targetWar -Force

          Write-Host "Starting Tomcat..."
          & "$tomcatHome\bin\startup.bat"

          Write-Host "Deployment completed successfully."