- name: Deploy WAR to Tomcat
  shell: powershell
  run: |
    $tomcatHome = "D:\Softwares\apache-tomcat-11.0.22"
    $webapps = "$tomcatHome\webapps"

    $warFile = ".\cicd.war"
    $targetWar = "$webapps\cicd.war"
    $explodedFolder = "$webapps\cicd"

    if (!(Test-Path $warFile)) {
        Write-Error "WAR file not found: $warFile"
        exit 1
    }

    Write-Host "Stopping Tomcat..."
    & "$tomcatHome\bin\shutdown.bat"

    Start-Sleep -Seconds 10

    Write-Host "Removing old deployment..."
    if (Test-Path $targetWar) {
        Remove-Item $targetWar -Force
    }

    if (Test-Path $explodedFolder) {
        Remove-Item $explodedFolder -Recurse -Force
    }

    Write-Host "Copying new WAR..."
    Copy-Item $warFile $targetWar -Force

    Write-Host "Starting Tomcat..."
    & "$tomcatHome\bin\startup.bat"

    Write-Host "Deployment completed successfully."