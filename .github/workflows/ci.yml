name: Java CI/CD

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Build, Test & Package
        run: mvn verify

      - name: Upload JaCoCo Report
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: target/site/jacoco

      - name: Upload WAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: springboot-war
          path: target/cicd.war

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted

    steps:
      - name: Download WAR
        uses: actions/download-artifact@v4
        with:
          name: springboot-war

      - name: Deploy to Tomcat
        run: |
          $tomcatWebapps = "D:\Softwares\apache-tomcat-11.0.22\webapps"
          $warPath = "$tomcatWebapps\cicd.war"
          $explodedPath = "$tomcatWebapps\cicd"

          Write-Host "Stopping Tomcat service..."
          Stop-Service -Name "Tomcat11" -ErrorAction SilentlyContinue
          Start-Sleep -Seconds 2

          Write-Host "Removing old deployment..."
          Remove-Item -Path $warPath -Force -ErrorAction SilentlyContinue
          Remove-Item -Path $explodedPath -Recurse -Force -ErrorAction SilentlyContinue

          Write-Host "Copying new WAR..."
          Copy-Item -Path "cicd.war" -Destination $warPath

          Write-Host "Starting Tomcat service..."
          Start-Service -Name "Tomcat11" -ErrorAction SilentlyContinue
          Write-Host "Deployment complete"
